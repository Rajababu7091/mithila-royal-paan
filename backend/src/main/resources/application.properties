# Server config
server.port=${PORT:8080}

# Serve static files from the frontend folder
spring.web.resources.static-locations=classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:../frontend/

# Database config (Railway MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Database initialization from schema.sql
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# Google OAuth2 Client Settings
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:YOUR_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:YOUR_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email

# Custom App Settings
mithila.app.jwtSecret=${JWT_SECRET:MithilaRoyalPaanPremiumSecretKeyForJWTTokenAuthService123!}
mithila.app.jwtExpirationMs=86400000

# File Upload Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini AI Configuration (AI Chatbot)
gemini.api.key=${GEMINI_API_KEY:YOUR_API_KEY_HERE}
gemini.api.model=gemini-2.5-flash
gemini.api.max-tokens=1024
gemini.api.temperature=0.85
