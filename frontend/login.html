<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mithila Royal Paan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="mithila-motif-bg d-flex align-items-center justify-content-center min-vh-100 py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                
                <!-- Logo -->
                <div class="text-center mb-4">
                    <a href="/index.html" class="text-decoration-none">
                        <h1 class="royal-font text-warning display-5 m-0"><i class="bi bi-leaf-fill text-warning me-2"></i>Mithila Royal Paan</h1>
                    </a>
                </div>

                <div class="royal-card">
                    <h3 class="royal-font text-white text-center mb-4">Account Login</h3>
                    
                    <div id="login-alert-container"></div>

                    <form id="login-form">
                        <div class="mb-3">
                            <label for="login-email" class="form-label text-warning small royal-font">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text form-royal-control border-end-0"><i class="bi bi-envelope text-warning"></i></span>
                                <input type="email" class="form-control form-royal-control border-start-0" id="login-email" placeholder="Enter your email" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="d-flex justify-content-between">
                                <label for="login-password" class="form-label text-warning small royal-font">Password</label>
                                <a href="#" class="text-warning small text-decoration-none royal-font" onclick="alert('Email verification triggers have been sent to your primary address if registered.')">Forgot Password?</a>
                            </div>
                            <div class="input-group">
                                <span class="input-group-text form-royal-control border-end-0"><i class="bi bi-lock text-warning"></i></span>
                                <input type="password" class="form-control form-royal-control border-start-0" id="login-password" placeholder="Enter your password" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-gold w-100 btn-lg mt-3">Access Account</button>
                    </form>

                    <!-- Divider -->
                    <div class="position-relative text-center my-4">
                        <hr class="border-warning opacity-25">
                        <span class="position-absolute top-50 start-50 translate-middle px-3 text-secondary bg-secondary royal-font" style="background-color: var(--bg-secondary) !important;">OR</span>
                    </div>

                    <!-- Social Login -->
                    <a href="/oauth2/authorization/google" class="btn btn-outline-light w-100 d-flex align-items-center justify-content-center border-warning text-warning" style="background: transparent;">
                        <svg class="me-2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                            <path fill="#4285F4" d="M46.5 24c0-1.55-.15-3.24-.47-4.77H24v9.03h12.75c-.55 2.95-2.22 5.46-4.72 7.14l7.35 5.7C43.7 36.85 46.5 30.95 46.5 24z"/>
                            <path fill="#FBBC05" d="M10.54 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.98-6.19z"/>
                            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.35-5.7c-2.21 1.48-5.02 2.36-8.54 2.36-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                        </svg>
                        Sign in with Google
                    </a>

                    <p class="text-center text-secondary mt-4 mb-0 small">
                        Don't have an account? <a href="/register.html" class="text-warning text-decoration-none royal-font">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/main.js"></script>

    <!-- Page Login Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check redirect status
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('login_required')) {
                showGlobalAlert('You must login to request an event booking or place orders.', 'warning', 'login-alert-container');
            } else if (urlParams.get('session_expired')) {
                showGlobalAlert('Your session has expired. Please sign in again.', 'warning', 'login-alert-container');
            } else if (urlParams.get('logout')) {
                showGlobalAlert('You have logged out successfully.', 'success', 'login-alert-container');
            } else if (urlParams.get('unauthorized')) {
                showGlobalAlert('Access denied. Please authenticate.', 'danger', 'login-alert-container');
            } else if (urlParams.get('forbidden')) {
                showGlobalAlert('Access forbidden: Insufficient permissions.', 'danger', 'login-alert-container');
            }

            // Standard credentials form submission
            document.getElementById('login-form').addEventListener('submit', (e) => {
                e.preventDefault();

                const email = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;

                Auth.login(email, password)
                    .then(data => {
                        // Check if redirect target exists
                        const redirectUrl = localStorage.getItem('redirect_after_login');
                        if (redirectUrl) {
                            localStorage.removeItem('redirect_after_login');
                            window.location.href = redirectUrl;
                            return;
                        }

                        // Default redirection based on role
                        if (data.role === 'ROLE_SUPER_ADMIN' || data.role === 'ROLE_STAFF') {
                            window.location.href = '/admin.html';
                        } else {
                            window.location.href = '/dashboard.html';
                        }
                    })
                    .catch(err => {
                        showGlobalAlert(err.message || 'Login failed. Please verify credentials.', 'danger', 'login-alert-container');
                    });
            });
        });
    </script>
</body>
</html>
